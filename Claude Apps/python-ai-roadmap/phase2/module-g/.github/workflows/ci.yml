name: Module G CI

on:
  push:
    paths:
      - "phase2/module-g/**"
  pull_request:
    paths:
      - "phase2/module-g/**"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: phase2/module-g

    steps:
      - uses: actions/checkout@v4
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install uv
        run: pip install uv
      - name: Install dependencies
        run: uv sync --all-extras
      - name: Lint (ruff)
        run: uv run ruff check .
      - name: Type check (mypy)
        run: uv run mypy utils.py
      - name: Tests + coverage
        run: uv run pytest
