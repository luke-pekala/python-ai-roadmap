name: CI — Module H

on:
  push:
    paths:
      - "phase2/module-h/**"
  pull_request:
    paths:
      - "phase2/module-h/**"

defaults:
  run:
    working-directory: phase2/module-h

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"
      - run: uv sync --all-groups
      - run: uv run pytest
      - run: uv run mypy charts.py
      - run: uv run ruff check .
